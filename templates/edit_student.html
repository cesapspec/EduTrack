{% extends "base.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="page-header">
    <a href="/students/{{ student_id }}" style="font-size:13px; color:#e94560; text-decoration:none;">
        ← Back to Student Profile
    </a>
    <h1 style="margin-top:8px;">Edit Student</h1>
    <p>Update {{ student['first_name'] }} {{ student['last_name'] }}'s information</p>
</div>

<div style="max-width: 600px;">
    <div class="card">
        <h2>Student Information</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="two-col">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="fname" value="{{ student['first_name'] }}" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="lname" value="{{ student['last_name'] }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Middle Name <span style="color:#bbb; font-weight:400;">(optional)</span></label>
                <input type="text" name="mname" value="{{ student['middle_name'] or '' }}">
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="date_of_birth" 
                       value="{{ student['date_of_birth'].strftime('%Y-%m-%d') if student['date_of_birth'] else '' }}">
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" value="{{ student['email'] }}" required>
            </div>

            <div class="form-group">
                <label>Address <span style="color:#bbb; font-weight:400;">(optional)</span></label>
                <input type="text" name="address" value="{{ student['address'] or '' }}">
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label>Guardian Name <span style="color:#bbb; font-weight:400;">(optional)</span></label>
                    <input type="text" name="guardian_name" value="{{ student['guardian_name'] or '' }}">
                </div>
                <div class="form-group">
                    <label>Guardian Phone <span style="color:#bbb; font-weight:400;">(optional)</span></label>
                    <input type="text" name="guardian_phone" value="{{ student['guardian_phone'] or '' }}">
                </div>
            </div>

            <div class="form-group">
                <label>Grade Level *</label>
                <select name="grade_level" required>
                    <option value="9" {% if student['grade_level'] == 9 %}selected{% endif %}>Grade 9</option>
                    <option value="10" {% if student['grade_level'] == 10 %}selected{% endif %}>Grade 10</option>
                    <option value="11" {% if student['grade_level'] == 11 %}selected{% endif %}>Grade 11</option>
                    <option value="12" {% if student['grade_level'] == 12 %}selected{% endif %}>Grade 12</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/students/{{ student_id }}" class="btn" 
                   style="background:#f0f2f5; color:#555;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
